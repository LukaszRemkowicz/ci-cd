name: Branch Protection Check

on:
  workflow_call:
    inputs:
      target_branch:
        description: Protected base branch.
        required: false
        default: main
        type: string
      allowed_exact_branches:
        description: Comma-separated source branches allowed to merge into the target branch.
        required: false
        default: dev
        type: string
      allowed_pattern_branches:
        description: Comma-separated bash regex patterns allowed to merge into the target branch.
        required: false
        default: ^hotfix/.*,^release/.*
        type: string

jobs:
  branch-protection:
    name: Check Branch Protection Rules
    runs-on: ubuntu-latest

    steps:
      - name: Validate branch source
        shell: bash
        env:
          TARGET_BRANCH_INPUT: ${{ inputs.target_branch }}
          ALLOWED_EXACT_BRANCHES: ${{ inputs.allowed_exact_branches }}
          ALLOWED_PATTERN_BRANCHES: ${{ inputs.allowed_pattern_branches }}
        run: |
          set -euo pipefail

          SOURCE_BRANCH="${{ github.head_ref }}"
          TARGET_BRANCH="${{ github.base_ref }}"

          echo "Source branch: $SOURCE_BRANCH"
          echo "Target branch: $TARGET_BRANCH"

          if [[ "$TARGET_BRANCH" != "$TARGET_BRANCH_INPUT" ]]; then
            echo "Target branch is not protected by this workflow."
            exit 0
          fi

          IFS=',' read -r -a exact_branches <<< "$ALLOWED_EXACT_BRANCHES"
          for branch in "${exact_branches[@]}"; do
            if [[ "$SOURCE_BRANCH" == "$branch" ]]; then
              echo "Exact source branch is allowed."
              exit 0
            fi
          done

          IFS=',' read -r -a pattern_branches <<< "$ALLOWED_PATTERN_BRANCHES"
          for pattern in "${pattern_branches[@]}"; do
            if [[ "$SOURCE_BRANCH" =~ $pattern ]]; then
              echo "Pattern source branch is allowed."
              exit 0
            fi
          done

          echo "BRANCH PROTECTION VIOLATION"
          echo "Cannot merge '$SOURCE_BRANCH' directly into '$TARGET_BRANCH_INPUT'."
          echo "Allowed exact branches: $ALLOWED_EXACT_BRANCHES"
          echo "Allowed patterns: $ALLOWED_PATTERN_BRANCHES"
          exit 1
