name: Trivy Scan

on:
  workflow_call:
    inputs:
      scan_path:
        description: Path to scan.
        required: false
        default: .
        type: string
      severity:
        description: Comma-separated severities to report.
        required: false
        default: CRITICAL,HIGH
        type: string
      output_file:
        description: SARIF output filename.
        required: false
        default: trivy-results.sarif
        type: string
      category:
        description: SARIF category.
        required: false
        default: trivy
        type: string
      trivy_image:
        description: Trivy container image.
        required: false
        default: aquasec/trivy:0.58.1
        type: string

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  trivy:
    name: Trivy Security Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ${{ inputs.trivy_image }} fs \
              --format sarif \
              --output ${{ inputs.output_file }} \
              --exit-code 0 \
              --severity ${{ inputs.severity }} \
              ${{ inputs.scan_path }}

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: ${{ inputs.output_file }}
          category: ${{ inputs.category }}
