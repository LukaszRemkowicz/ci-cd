name: PR Status Report

on:
  workflow_call:
    inputs:
      status_items_json:
        description: JSON object mapping status labels to workflow results.
        required: true
        type: string
      success_message:
        description: Message used when all checks pass.
        required: false
        default: All checks passed.
        type: string
      failure_message:
        description: Message used when at least one check fails.
        required: false
        default: Some checks failed. Please review the logs.
        type: string

permissions:
  issues: write
  pull-requests: write

jobs:
  pr-status:
    name: PR Status Report
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request'

    steps:
      - name: Report status
        uses: actions/github-script@v7
        env:
          STATUS_ITEMS_JSON: ${{ inputs.status_items_json }}
          SUCCESS_MESSAGE: ${{ inputs.success_message }}
          FAILURE_MESSAGE: ${{ inputs.failure_message }}
        with:
          script: |
            if (context.payload.pull_request?.head?.repo?.fork) {
              core.info('Skipping PR status comment for forked pull request: GITHUB_TOKEN cannot write issue comments in this context.');
              return;
            }

            const results = JSON.parse(process.env.STATUS_ITEMS_JSON);
            const successMessage = process.env.SUCCESS_MESSAGE;
            const failureMessage = process.env.FAILURE_MESSAGE;
            const emoji = (s) => s === 'success' ? '✅' : (s === 'failure' ? '❌' : '⏹️');

            let body = `## CI/CD Pipeline Results\n\n| Check | Status |\n|---|---|\n`;
            for (const [name, res] of Object.entries(results)) {
              body += `| ${name} | ${emoji(res)} ${res} |\n`;
            }

            const allSuccess = Object.values(results).every(s => s === 'success');
            body += `\n${allSuccess ? successMessage : failureMessage}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c => c.body.includes('CI/CD Pipeline Results'));

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
