name: Node Tests

on:
  workflow_call:
    inputs:
      node_version:
        description: Node.js version for the runner.
        required: false
        default: "24"
        type: string
      working_directory:
        description: Working directory for Node commands.
        required: false
        default: .
        type: string
      cache_dependency_path:
        description: Path used for npm cache invalidation.
        required: false
        default: package-lock.json
        type: string
      install_command:
        description: Command used to install dependencies.
        required: false
        default: npm ci
        type: string
      test_command:
        description: Command used to run tests.
        required: false
        default: npm test -- --coverage --watchAll=false
        type: string
      test_environment:
        description: Optional multiline KEY=VALUE pairs exported before tests run.
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  tests:
    name: Node Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
          cache-dependency-path: ${{ inputs.cache_dependency_path }}

      - name: Install dependencies
        working-directory: ${{ inputs.working_directory }}
        run: ${{ inputs.install_command }}

      - name: Export test environment
        if: ${{ inputs.test_environment != '' }}
        run: |
          printf '%s\n' '${{ inputs.test_environment }}' >> "$GITHUB_ENV"

      - name: Run tests
        working-directory: ${{ inputs.working_directory }}
        run: ${{ inputs.test_command }}
