name: Release Tag

on:
  workflow_call:
    inputs:
      version_file:
        description: Path to the version file.
        required: false
        default: VERSION
        type: string
      tag_prefix:
        description: Prefix used for release tags.
        required: false
        default: v
        type: string

permissions:
  contents: write

jobs:
  tag-main:
    name: Tag main from version file
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release_tag.outputs.value }}
      tag_created: ${{ steps.release_tag.outputs.created }}
      version_changed: ${{ steps.release_tag.outputs.version_changed }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag if missing
        id: release_tag
        shell: bash
        env:
          VERSION_FILE: ${{ inputs.version_file }}
          TAG_PREFIX: ${{ inputs.tag_prefix }}
        run: |
          set -euo pipefail

          git fetch origin main --tags

          if [[ ! -f "$VERSION_FILE" ]]; then
            echo "ERROR: Version file missing on main: $VERSION_FILE"
            exit 1
          fi

          CURRENT_VERSION="$(tr -d ' \t\r\n' < "$VERSION_FILE")"
          if ! [[ "$CURRENT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: VERSION must be MAJOR.MINOR.PATCH. Got: '$CURRENT_VERSION'"
            exit 1
          fi

          TARGET_TAG="${TAG_PREFIX}${CURRENT_VERSION}"
          LATEST_TAG="$(git tag -l "${TAG_PREFIX}*" --sort=-v:refname | head -n 1)"

          if [[ -n "$LATEST_TAG" ]] && git cat-file -e "$LATEST_TAG:$VERSION_FILE" 2>/dev/null; then
            PREVIOUS_VERSION="$(git show "$LATEST_TAG:$VERSION_FILE" | tr -d ' \t\r\n')"
          else
            PREVIOUS_VERSION=""
          fi

          if [[ "$PREVIOUS_VERSION" == "$CURRENT_VERSION" ]]; then
            echo "VERSION unchanged since latest release tag."
            echo "value=${TARGET_TAG}" >> "${GITHUB_OUTPUT}"
            echo "created=false" >> "${GITHUB_OUTPUT}"
            echo "version_changed=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if git rev-parse "$TARGET_TAG" >/dev/null 2>&1; then
            echo "Tag already exists: $TARGET_TAG"
            echo "value=${TARGET_TAG}" >> "${GITHUB_OUTPUT}"
            echo "created=false" >> "${GITHUB_OUTPUT}"
            echo "version_changed=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git tag -a "$TARGET_TAG" -m "Release $TARGET_TAG"
          git push origin "$TARGET_TAG"

          echo "value=${TARGET_TAG}" >> "${GITHUB_OUTPUT}"
          echo "created=true" >> "${GITHUB_OUTPUT}"
          echo "version_changed=true" >> "${GITHUB_OUTPUT}"
