name: CodeQL

on:
  workflow_call:
    inputs:
      languages_json:
        description: JSON array of CodeQL languages to analyze.
        required: false
        default: '["python"]'
        type: string
      config_file:
        description: Optional CodeQL config file path.
        required: false
        default: ""
        type: string

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze-default:
    name: Analyze
    if: ${{ inputs.config_file == '' }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(inputs.languages_json) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}

  analyze-with-config:
    name: Analyze
    if: ${{ inputs.config_file != '' }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(inputs.languages_json) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          config-file: ${{ inputs.config_file }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}
