name: Python Tests UV

on:
  workflow_call:
    inputs:
      python_version:
        description: Python version for the runner.
        required: false
        default: "3.13"
        type: string
      working_directory:
        description: Working directory for Python commands.
        required: false
        default: .
        type: string
      test_environment:
        description: Optional multiline KEY=VALUE pairs exported before tests run.
        required: false
        default: ""
        type: string
      postgres_enabled:
        description: Whether to start a Postgres service container.
        required: false
        default: false
        type: boolean
      postgres_image:
        description: Postgres image to use when enabled.
        required: false
        default: postgres:18
        type: string
      postgres_db:
        description: Postgres database name.
        required: false
        default: test_db
        type: string
      postgres_user:
        description: Postgres user name.
        required: false
        default: postgres
        type: string
      postgres_password:
        description: Postgres password.
        required: false
        default: postgres
        type: string
      postgres_port:
        description: Host port to expose Postgres on.
        required: false
        default: "5432"
        type: string

permissions:
  contents: read

jobs:
  tests:
    name: Python Tests
    if: ${{ !inputs.postgres_enabled }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: ${{ inputs.working_directory }}/uv.lock

      - name: Install dependencies
        working-directory: ${{ inputs.working_directory }}
        run: uv sync --locked

      - name: Export test environment
        if: ${{ inputs.test_environment != '' }}
        run: |
          printf '%s\n' '${{ inputs.test_environment }}' >> "$GITHUB_ENV"

      - name: Run tests
        working-directory: ${{ inputs.working_directory }}
        run: uv run pytest

  tests-with-postgres:
    name: Python Tests
    if: ${{ inputs.postgres_enabled }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: ${{ inputs.postgres_image }}
        env:
          POSTGRES_PASSWORD: ${{ inputs.postgres_password }}
          POSTGRES_USER: ${{ inputs.postgres_user }}
          POSTGRES_DB: ${{ inputs.postgres_db }}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - ${{ inputs.postgres_port }}:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: ${{ inputs.working_directory }}/uv.lock

      - name: Install dependencies
        working-directory: ${{ inputs.working_directory }}
        run: uv sync --locked

      - name: Export test environment
        if: ${{ inputs.test_environment != '' }}
        run: |
          printf '%s\n' '${{ inputs.test_environment }}' >> "$GITHUB_ENV"

      - name: Run tests
        working-directory: ${{ inputs.working_directory }}
        run: uv run pytest
